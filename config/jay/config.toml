keymap.rmlvo = { layout = "us", variants = "" }

on-graphics-initialized = [
  # { type = "exec", exec = "mako" },
  # { type = "exec", exec = "wl-tray-bridge" },
  { type = "exec", exec = "wayland-pipewire-idle-inhibit" },
  { type = "exec", exec = ["vicinae", "server"] },
  { type = "exec", exec = ["solaar", "-w", "hide"] },
  { type = "exec", exec = ["discord"] },
  { type = "exec", exec = ["signal-desktop", "--password-store=kwallet6"] },
  { type = "exec", exec = ["steam"] },
  { type = "exec", exec = ["firefox"] },
  { type = "exec", exec = ["noctalia", "--daemon"], privileged = true },
  { type = "exec", exec = ["xrandr", "--output", "DP-3", "--primary"] },
]

show-bar = false
show-titles = false

auto-reload = true

# on-idle = { type = "exec", exec = { shell = "noctalia msg session lock" } }

[[outputs]]
name = "right"
match.connector = "DP-3"
x = 1920
y = 0
mode = { width = 2560, height = 1440, refresh-rate = 359.979 }
vrr = { mode = "variant1", cursor-hz = 90 }
tearing.mode = "variant1"

[[outputs]]
name = "left"
match.connector = "HDMI-A-1"
x = 0
y = 0
mode = { width = 1920, height = 1080, refresh-rate = 100.0 }

[[windows]]
match.x-class = "discord"
match.just-mapped = true
action = { type = "move-to-workspace", name = "5" }

[[windows]]
match.app-id = "signal"
match.just-mapped = true
action = { type = "move-to-workspace", name = "5" }

[[windows]]
match.x-class = "steam"
match.just-mapped = true
action = { type = "move-to-workspace", name = "3" }

[[windows]]
match.app-id = "solaar"
match.just-mapped = true
action = { type = "move-to-workspace", name = "2" }

[[windows]]
match.app-id = "firefox"
match.just-mapped = true
action = { type = "move-to-workspace", name = "4" }

[color-management]
enabled = true


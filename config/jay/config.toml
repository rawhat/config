[complex-shortcuts]
XF86AudioRaiseVolume = { action.type = "exec", action.exec.shell = "noctalia msg volume-up", repeat = true, allow-locked = true }
XF86AudioLowerVolume = { action.type = "exec", action.exec.shell = "noctalia msg volume-down", repeat = true, allow-locked = true }
XF86AudioMute = { action.type = "exec", action.exec.shell = "noctalia msg volume-mute", repeat = true, allow-locked = true }

[[clients]]
capabilities = "all"

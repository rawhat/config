[workspaces."1"]
initial-output.connector = "DP-3"
[workspaces."2"]
initial-output.connector = "DP-3"
[workspaces."3"]
initial-output.connector = "DP-3"
[workspaces."4"]
initial-output.connector = "HDMI-A-1"
[workspaces."5"]
initial-output.connector = "HDMI-A-1"

[shortcuts]
alt-h = "focus-left"
alt-j = "focus-down"
alt-k = "focus-up"
alt-l = "focus-right"

alt-shift-h = "move-left"
alt-shift-j = "move-down"
alt-shift-k = "move-up"
alt-shift-l = "move-right"

alt-d = "split-horizontal"
alt-v = "split-vertical"

alt-t = "toggle-split"
alt-m = "toggle-mono"
alt-u = "toggle-fullscreen"

alt-f = "focus-parent"
alt-c = "open-control-center"
alt-shift-c = "close"
alt-shift-f = "toggle-floating"
logo-t = { type = "exec", exec = "wezterm-gui" }
alt-space = { type = "exec", exec = { prog = "vicinae", args = [
  "toggle",
], privileged = true } }
alt-shift-x = "quit"
alt-shift-r = "reload-config-toml"
logo-e = { type = "exec", exec = "dolphin" }

alt-shift-s = { type = "exec", exec = { shell = "grim -g \"$(slurp)\" - | wl-copy --type image/png" } }
Print = { type = "exec", exec = { shell = "grim -o DP-3 \"$(xdg-user-dir PICTURES)/$(date +'%s_grim.png')\"" } }

logo-l = { type = "exec", exec = { shell = "noctalia msg session lock" } }


ctrl-alt-F1 = { type = "switch-to-vt", num = 1 }
ctrl-alt-F2 = { type = "switch-to-vt", num = 2 }
ctrl-alt-F3 = { type = "switch-to-vt", num = 3 }
ctrl-alt-F4 = { type = "switch-to-vt", num = 4 }
ctrl-alt-F5 = { type = "switch-to-vt", num = 5 }
ctrl-alt-F6 = { type = "switch-to-vt", num = 6 }
ctrl-alt-F7 = { type = "switch-to-vt", num = 7 }
ctrl-alt-F8 = { type = "switch-to-vt", num = 8 }
ctrl-alt-F9 = { type = "switch-to-vt", num = 9 }
ctrl-alt-F10 = { type = "switch-to-vt", num = 10 }
ctrl-alt-F11 = { type = "switch-to-vt", num = 11 }
ctrl-alt-F12 = { type = "switch-to-vt", num = 12 }

alt-1 = [{ type = "show-workspace", name = "1" }, "warp-mouse-to-focus"]
alt-2 = [{ type = "show-workspace", name = "2" }, "warp-mouse-to-focus"]
alt-3 = [{ type = "show-workspace", name = "3" }, "warp-mouse-to-focus"]
